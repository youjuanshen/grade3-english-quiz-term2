<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>清除缓存专用通道</title>
</head>
<body style="text-align: center; padding: 50px;">
    <h2>正在执行缓存清理与重定向...</h2>
    <script>
        // Use a cache-busting timestamp redirect
        var ts = new Date().getTime();
        window.location.replace("index.html?t=" + ts);
    </script>
</body>
</html>
