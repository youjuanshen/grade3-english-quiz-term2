<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>口语面试 - 三年级下册</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container teacher-theme">

        <div id="menuBox" class="card">
            <h2>🗣️ 口语面试 <span class="semester-tag">下学期版</span></h2>
            <p style="color:#666;">请在面试位为学生打分：</p>
            <div class="course-container">
                <div class="unit-card">
                    <span class="unit-title">Unit 1: Our Animal Friends</span>
                    <div class="lesson-btn-group">
                        <div class="lesson-btn" onclick="selectLesson(this, 'u1_l1.js')">L1: I like cats</div>
                        <div class="lesson-btn" onclick="selectLesson(this, 'u1_l2.js')">L2: Do you like dogs?</div>
                        <div class="lesson-btn" onclick="selectLesson(this, 'u1_l3.js')">L3: Fun Animals</div>
                        <div class="lesson-btn" onclick="selectLesson(this, 'u1_l4.js')">L4: Unit Review</div>
                    </div>
                </div>
                <div class="unit-card">
                    <span class="unit-title">Unit 2: My Clothes</span>
                    <div class="lesson-btn-group">
                        <div class="lesson-btn" onclick="selectLesson(this, 'u2_l1.js')">L1: My T-shirt</div>
                        <div class="lesson-btn" onclick="selectLesson(this, 'u2_l2.js')">L2: Whose dress?</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="loadingBox" class="hidden text-center">
            <p>加载题库中...</p>
        </div>

        <div id="setupBox" class="card hidden">
            <h3 id="examTitle">...</h3>
            <p style="text-align:center; color:#666;">选择面前的学生：</p>
            <div id="studentGrid" class="student-grid"></div>
            <input type="hidden" id="selectedStudentName" value="">
            <button class="btn-primary" id="startBtn" onclick="startExam()" style="margin-top:20px; width:100%;"
                disabled>开始面试打分 🎤</button>
        </div>

        <div id="quizInterface" class="hidden">
            <div class="header-bar">
                <span id="studentNameDisplay">Student</span>
                <span class="timer">面试中</span>
            </div>
            <div class="progress-bar-bg">
                <div id="progressBar"></div>
            </div>
            <div id="progressText" class="text-small"></div>
            <div class="card question-card">
                <div id="qContent"></div>
            </div>
            <div class="nav-bar">
                <button id="btnPrev" onclick="prevQ()">⬅️ 上一题</button>
                <button id="btnNext" onclick="nextQ()">下一题 ➡️</button>
                <button id="btnSubmit" onclick="submit()" class="btn-success hidden">✅ 提交分数</button>
            </div>
        </div>

        <div id="submittingBox" class="card hidden text-center">正在保存成绩...</div>
        <div id="resultBox" class="card hidden text-center"></div>

    </div>

    <script src="script_engine.js?v=2.3"></script>
    <script>
        initEngine('speaking');

        const STUDENTS = [
            "1. 张宇豪", "2. 张佳寒", "3. 张睿渊", "4. 张羽韬", "5. 张美茹",
            "6. 张嘉钦", "7. 卢梦婷", "8. 张悦萱", "9. 张语涵", "10. 张英豪",
            "11. 张志鹏", "12. 张智杰", "13. 张梓婷", "14. 张品琪", "15. 张诺依",
            "16. 张雨泽", "17. 张依彤", "18. 张艺楠", "19. 张思彤", "20. 张子豪",
            "21. 张梓亦", "22. 张皓鑫", "23. 张雨欣", "24. 张如欣", "25. 张柏涵",
            "26. 张梓纯", "27. 张泽鑫"
        ];

        const grid = document.getElementById('studentGrid');
        STUDENTS.forEach(name => {
            const btn = document.createElement('div');
            btn.className = 'name-btn';
            btn.innerText = name;
            btn.onclick = function () {
                document.querySelectorAll('.name-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('selectedStudentName').value = name;
                document.getElementById('startBtn').disabled = false;
            };
            grid.appendChild(btn);
        });

        function selectLesson(el, path) {
            document.querySelectorAll('.lesson-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            loadPaper(path);
        }
    </script>
</body>

</html>
